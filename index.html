<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="resvp is coming soon on iOS. Feel your city's pulse through the music and places around you.">
  <meta name="theme-color" content="#7A1220">
  <title>resvp | feel your city's pulse.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__content">
        <img class="hero__logo" src="assets/logo.svg" alt="resvp logo" width="1254" height="1254">
        <p class="hero__wordmark">resvp</p>
        <h1 id="hero-title">feel your city's pulse.</h1>
        <p class="hero__subhead">See what your city is listening to.</p>
        <div class="hero__availability" aria-label="Coming soon on App Store">
          <span class="hero__availability-text">Coming soon on</span>
          <span class="app-store-badge" aria-hidden="true">
            <span class="app-store-badge__mark"></span>
            <span class="app-store-badge__copy">
              <span>App Store</span>
            </span>
          </span>
        </div>
      </div>

      <div class="device-stage" aria-label="resvp app preview">
        <figure class="iphone iphone--rear">
          <span class="iphone__screen">
            <img src="assets/map-tab.PNG" alt="Map tab preview" width="1170" height="2532">
          </span>
          <img class="iphone__frame" src="assets/iphone-frame.png" alt="" aria-hidden="true" width="1170" height="2532">
        </figure>

        <figure class="iphone iphone--front">
          <span class="iphone__screen">
            <img src="assets/live-tab.PNG" alt="Live tab preview" width="1170" height="2532">
          </span>
          <img class="iphone__frame" src="assets/iphone-frame.png" alt="" aria-hidden="true" width="1170" height="2532">
        </figure>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="https://www.instagram.com/resvp.app" aria-label="resvp on Instagram">@resvp.app</a>
    <a href="https://getresvp.app">getresvp.app</a>
    <p>&copy; 2026 resvp. All rights reserved.</p>
  </footer>
</body>
</html>
